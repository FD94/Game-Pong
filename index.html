<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pong</title>
	</head>
	<body>
		<h1>Pong</h1>

		<div id="scoreboard">
			<div class="score" id="score-left">0</div>
			<div class="score-divider">:</div>
			<div class="score" id="score-right">0</div>
		</div>

		<div id="area">
			<div id="paddle" class="paddle-left"></div>
			<div id="paddle" class="paddle-rigth"></div>
			<div id="ball"></div>
			<div id="center-line"></div>
		</div>

		<div id="overlay">
			<h2 id="overlay-title">PONG</h2>
			<p>El primer jugador en llegar a 7 puntos gana</p>
			<button id="start-btn">INICIAR</button>
		</div>
	</body>
</html>
